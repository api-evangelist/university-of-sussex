aid: university-of-sussex
name: University of Sussex
description: >-
  The University of Sussex is a research-intensive public university near
  Brighton, United Kingdom, ranked #247 in the QS World University Rankings
  2025. Its public, machine-readable footprint is limited: the university's
  research outputs (publications, data, theses) are hosted on Figshare, which
  exposes a public REST API, while identity and access are managed through
  Okta single sign-on (OAuth2/OpenID Connect) for staff and students. The
  former Sussex Research Online EPrints repository and its OAI-PMH endpoint
  have been decommissioned and now redirect to the Figshare-backed
  publications service. A GitHub organization exists but currently publishes
  no public repositories.
